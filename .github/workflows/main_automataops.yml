name: Build and Deploy AutomataOps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v || echo "No tests yet"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/AutomataOps

            # Force sync with GitHub
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies using venv full path
            ~/AutomataOps/backend/venv/bin/pip install -r ~/AutomataOps/backend/requirements.txt

            # Kill existing uvicorn
            pkill -f uvicorn || true
            sleep 2

            # Start uvicorn using full path and nohup properly
            cd ~/AutomataOps/backend
            nohup ~/AutomataOps/backend/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > ~/app.log 2>&1 &
            echo $! > ~/uvicorn.pid
            disown -h $!
            sleep 3
            echo "Deployment complete!"
